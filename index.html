<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside>
            <h2>Dashboard 📊</h2>
            <ul>
                <li>Home</li>
                <li>Users</li>
                <li>Analytics</li>
                <li>Settings</li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main>

            <!-- HEADER -->
            <header>
                <h2>Welcome, Yash 👋</h2>
            </header>

            <!-- CARDS -->
            <section class="cards">

                <div class="card">
                    <h3>Users</h3>
                    <p>1200</p>
                </div>

                <div class="card">
                    <h3>Sales</h3>
                    <p>₹50,000</p>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <p>320</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>₹1,20,000</p>
                </div>

            </section>

        </main>

    </div>

</body>
</html>
